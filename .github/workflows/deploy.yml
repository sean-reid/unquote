name: Deploy

on:
  push:
    branches: [main]

# Inert until the repository variable DEPLOY_ENABLED is set to 'true'
# and the SSH_PRIVATE_KEY / DEPLOY_HOST secrets exist.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start ssh agent with the deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          printf '%s\n' "$SSH_PRIVATE_KEY" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          printf 'StrictHostKeyChecking accept-new\n' >> ~/.ssh/config
      - name: Deploy
        env:
          UNQUOTE_HOST: ${{ secrets.DEPLOY_HOST }}
        run: infra/ops/deploy.sh
