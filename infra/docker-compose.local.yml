# Local verification override: run the prod stack on a laptop that already has
# the dev ClickHouse on 8123, and skip TLS by serving Caddy on plain :8080.
#   docker compose -f docker-compose.prod.yml -f docker-compose.local.yml up -d --build
services:
  clickhouse:
    ports: !override
      - '127.0.0.1:8124:8123'
  caddy:
    ports: !override
      - '127.0.0.1:8080:80'
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
