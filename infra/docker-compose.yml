services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: unquote-clickhouse
    restart: unless-stopped
    ports:
      - '127.0.0.1:8123:8123'
      - '127.0.0.1:9000:9000'
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-unquote-local}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          'CMD',
          'clickhouse-client',
          '--password',
          '${CLICKHOUSE_PASSWORD:-unquote-local}',
          '--query',
          'SELECT 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  clickhouse-data:
